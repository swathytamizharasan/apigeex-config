name: Deploy to Apigee

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**' # Listens to changes in your proxies folder

permissions:
  contents: read
  id-token: write # Required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Keeps your workflow future-proofed
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          # Uses the clean secrets we set up earlier
          workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'
      
      - name: Set up apigeecli
        run: |
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH
      
      - name: Deploy to Apigee
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Loop through your JSON files inside the proxies folder
          for file in proxies/*.json; do
            name=$(basename "$file" .json)
            echo "Deploying Proxy: $name"
            
            # 1. Import the bundle (Using the updated 'apis' command)
            apigeecli apis bundle import -n "$name" -f "$file" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN"
            
            # 2. Deploy to environment (Using the updated 'apis' command)
            apigeecli apis deploy -n "$name" -e dev -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --ovr
          done
          echo "Deployment successful!"