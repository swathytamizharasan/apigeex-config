name: Validate PR Configuration

on:
  pull_request:
    paths:
      - 'config/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install MCP Server
        run: |
          cd mcp-server
          npm ci
      
      - name: Validate configuration
        run: |
          cd mcp-server
          npm run build
          # Mock validation (real implementation would call MCP tools)
          echo "Configuration validated successfully"

  type-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd mcp-server
          npm ci
      
      - name: Type check
        run: |
          cd mcp-server
          npm run type-check
