name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP_PROJECT_NUMBER
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Install apigeecli
        run: |
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh -
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          for file in proxies/*.json; do
            [[ -e "$file" ]] || { echo "No proxy JSON files found in proxies/"; exit 1; }

            name=$(basename "$file" .json)
            echo "Processing Proxy: $name from $file"

            # Per official docs: -f takes the full file path, -n is the proxy name
            create_output=$(apigeecli apis create openapi \
              -n "$name" \
              -f "$file" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --no-warnings 2>&1)

            echo "Create output: $create_output"

            # Get latest revision after import
            rev=$(apigeecli apis get \
              -n "$name" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --no-warnings 2>&1 | jq -r '.revision[-1]')

            echo "Revision: $rev"

            if [[ -z "$rev" || "$rev" == "null" ]]; then
              echo "ERROR: Could not determine revision for $name"
              exit 1
            fi

            echo "Deploying revision $rev of $name to dev..."
            apigeecli apis deploy \
              -n "$name" \
              -e dev \
              -v "$rev" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --ovr \
              --no-warnings

          done
          echo "Deployment successful!"