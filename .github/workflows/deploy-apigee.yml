name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up apigeecli
        run: |
          rm -rf $HOME/.apigeecli
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Ensure jq is available for parsing JSON responses
          sudo apt-get install -y jq
          APIGEE_BIN="$HOME/.apigeecli/bin/apigeecli"
          
          for file in proxies/*.json; do
            [[ -e "$file" ]] || continue
            name=$(basename "$file" .json)
            echo "Processing Proxy: $name"
            
            # 1. Attempt to create/import the bundle
            # We capture output to handle cases where it might already exist
            create_output=$($APIGEE_BIN apis create bundle -n "$name" -f "$file" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --format json 2>&1)
            
            # 2. Extract revision (if created, use that; otherwise get the latest)
            if echo "$create_output" | grep -q "revision"; then
               rev=$(echo "$create_output" | jq -r '.revision')
            else
               echo "Proxy likely exists, fetching latest revision..."
               rev=$($APIGEE_BIN apis get -n "$name" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --format json | jq -r '.revision | last')
            fi
            
            # 3. Deploy the identified revision
            echo "Deploying reviasion $rev to dev..."
            $APIGEE_BIN apis deploy -n "$name" -e dev -v "$rev" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --ovr
          done
          echo "Deployment successful!"