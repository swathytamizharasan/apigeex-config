name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          # Reverting to 'secrets' as these are typically stored in the Secrets tab.
          # If you specifically moved them to the 'Variables' tab, change this back to 'vars'.
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up apigeecli
        run: |
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Loop through proxies folder
          for file in proxies/*.json; do
            [[ -e "$file" ]] || continue
            name=$(basename "$file" .json)
            echo "Processing Proxy: $name"
            
            # 1. Import the OpenAPI spec as a new revision. 
            # apigeecli apis create --oasfile handles the conversion and import automatically.
            rev=$(apigeecli apis create -n "$name" --oasfile "$file" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --format json | jq -r '.revision')
            
            # 2. Deploy the specific revision to the 'dev' environment
            apigeecli apis deploy -n "$name" -e dev -v "$rev" -o "$APIGEE_ORG" -t "$APIGEE_TOKEN" --ovr
          done