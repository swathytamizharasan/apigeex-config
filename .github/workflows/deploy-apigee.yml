name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP_PROJECT_NUMBER
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up apigeecli
        run: |
          # Get the latest release version tag from GitHub API
          APIGEECLI_VERSION=$(curl -s https://api.github.com/repos/apigee/apigeecli/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          echo "Installing apigeecli $APIGEECLI_VERSION"

          # Download using the correct URL format with -L to follow redirects
          curl -L -o apigeecli.zip \
            "https://github.com/apigee/apigeecli/releases/download/${APIGEECLI_VERSION}/apigeecli_${APIGEECLI_VERSION}_Linux_x86_64.zip"

          # Verify it's actually a zip
          file apigeecli.zip

          unzip apigeecli.zip -d apigeecli_bin

          # Find binary regardless of subdirectory structure
          APIGEECLI_BIN=$(find apigeecli_bin -name "apigeecli" -type f)
          echo "Found binary at: $APIGEECLI_BIN"

          mkdir -p $HOME/.apigeecli/bin
          mv "$APIGEECLI_BIN" $HOME/.apigeecli/bin/apigeecli
          chmod +x $HOME/.apigeecli/bin/apigeecli
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

          # Verify install
          $HOME/.apigeecli/bin/apigeecli version

      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          for file in proxies/*.json; do
            [[ -e "$file" ]] || { echo "No proxy JSON files found in proxies/"; exit 1; }

            name=$(basename "$file" .json)
            folder=$(dirname "$file")
            filename=$(basename "$file")

            echo "Processing Proxy: $name from $file"

            rev=$(apigeecli apis create openapi \
              -n "$name" \
              -f "$folder" \
              --oas-name "$filename" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --format json | jq -r '.revision')

            if [[ -z "$rev" || "$rev" == "null" ]]; then
              echo "ERROR: Failed to import proxy $name — revision is empty"
              exit 1
            fi

            echo "Deploying revision $rev of $name to dev..."
            apigeecli apis deploy \
              -n "$name" \
              -e dev \
              -v "$rev" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --ovr

          done
          echo "Deployment successful!"