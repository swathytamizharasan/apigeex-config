name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP_PROJECT_NUMBER
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Install dependencies
        run: sudo apt-get install -y jq zip

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
          APIGEE_ENV: dev
        run: |
          set -e
          BASE_URL="https://apigee.googleapis.com/v1/organizations/${APIGEE_ORG}"

          for file in proxies/*.json; do
            [[ -e "$file" ]] || { echo "No proxy JSON files found in proxies/"; exit 1; }

            name=$(basename "$file" .json)
            echo "========================================="
            echo "Processing Proxy: $name"
            echo "========================================="

            # Step 1: Create a minimal proxy bundle zip from the JSON spec
            tmpdir=$(mktemp -d)
            mkdir -p "$tmpdir/apiproxy/policies" "$tmpdir/apiproxy/proxies" "$tmpdir/apiproxy/targets"

            # Create a basic proxy descriptor XML
            cat > "$tmpdir/apiproxy/${name}.xml" <<EOF
          <APIProxy name="${name}">
            <Description>Apigee API: ${name}</Description>
            <BasePaths>/</BasePaths>
          </APIProxy>
          EOF

            # Create proxy endpoint XML
            cat > "$tmpdir/apiproxy/proxies/default.xml" <<EOF
          <ProxyEndpoint name="default">
            <HTTPProxyConnection>
              <BasePath>/$(echo $name | tr '-' '/')</BasePath>
            </HTTPProxyConnection>
            <RouteRule name="default">
              <TargetEndpoint>default</TargetEndpoint>
            </RouteRule>
          </ProxyEndpoint>
          EOF

            # Create target endpoint XML using backend from JSON
            target_url=$(jq -r '.. | objects | select(has("x-google-backend")) | ."x-google-backend".address' "$file" | head -1)
            [[ -z "$target_url" || "$target_url" == "null" ]] && target_url="http://backend.example.com"

            cat > "$tmpdir/apiproxy/targets/default.xml" <<EOF
          <TargetEndpoint name="default">
            <HTTPTargetConnection>
              <URL>${target_url}</URL>
            </HTTPTargetConnection>
          </TargetEndpoint>
          EOF

            # Zip the bundle
            bundle_zip="$tmpdir/${name}.zip"
            (cd "$tmpdir" && zip -r "$bundle_zip" apiproxy/)
            echo "Bundle created: $bundle_zip"

            # Step 2: Import bundle to Apigee via REST API
            echo "Importing proxy bundle..."
            import_response=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${APIGEE_TOKEN}" \
              -H "Content-Type: multipart/form-data" \
              -F "file=@${bundle_zip};type=application/zip" \
              "${BASE_URL}/apis?action=import&name=${name}&validate=false")

            http_code=$(echo "$import_response" | tail -1)
            response_body=$(echo "$import_response" | head -n -1)

            echo "Import HTTP status: $http_code"
            echo "Import response: $response_body"

            if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
              echo "ERROR: Failed to import proxy $name (HTTP $http_code)"
              exit 1
            fi

            # Step 3: Extract the revision number
            rev=$(echo "$response_body" | jq -r '.revision')
            echo "Imported revision: $rev"

            if [[ -z "$rev" || "$rev" == "null" ]]; then
              echo "ERROR: Could not determine revision for $name"
              exit 1
            fi

            # Step 4: Deploy the revision
            echo "Deploying revision $rev of $name to $APIGEE_ENV..."
            deploy_response=$(curl -s -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${APIGEE_TOKEN}" \
              -H "Content-Type: application/json" \
              "${BASE_URL}/environments/${APIGEE_ENV}/apis/${name}/revisions/${rev}/deployments?override=true")

            deploy_http_code=$(echo "$deploy_response" | tail -1)
            deploy_body=$(echo "$deploy_response" | head -n -1)

            echo "Deploy HTTP status: $deploy_http_code"
            echo "Deploy response: $deploy_body"

            if [[ "$deploy_http_code" != "200" && "$deploy_http_code" != "201" ]]; then
              echo "ERROR: Failed to deploy proxy $name revision $rev (HTTP $deploy_http_code)"
              exit 1
            fi

            echo "Successfully deployed $name revision $rev to $APIGEE_ENV"
            rm -rf "$tmpdir"
          done

          echo "All proxies deployed successfully!"