name: Deploy to Apigee X

on:
  push:
    branches:
      - main
    paths:
      - 'proxies/**'
  pull_request:
    branches:
      - main
    paths:
      - 'proxies/**'

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: GCP_PROJECT_NUMBER   # ✅ FIX 1: Declare environment so env-scoped secrets are injected
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: 'google-github-actions/auth@v2'
        with:
          token_format: 'access_token'
          workload_identity_provider: "projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "apigee-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

      - name: Set up apigeecli
        run: |
          rm -rf $HOME/.apigeecli
          curl -L https://raw.githubusercontent.com/apigee/apigeecli/main/downloadLatest.sh | sh
          echo "$HOME/.apigeecli/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: sudo apt-get install -y jq

      - name: Deploy Apigee Proxies
        env:
          APIGEE_TOKEN: ${{ steps.auth.outputs.access_token }}
          APIGEE_ORG: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          APIGEE_BIN="$HOME/.apigeecli/bin/apigeecli"

          for file in proxies/*.json; do
            [[ -e "$file" ]] || { echo "No proxy JSON files found in proxies/"; exit 1; }
            name=$(basename "$file" .json)
            echo "Processing Proxy: $name"

            # ✅ FIX 2: Use 'apis create' with --oasfile for OpenAPI spec JSON files,
            # not 'apis create bundle' which expects a zip/directory bundle
            create_output=$($APIGEE_BIN apis create \
              -n "$name" \
              --oasfile "$file" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --format json 2>&1) || true

            echo "Create output: $create_output"

            # Get the latest revision (works whether just created or already existed)
            rev=$($APIGEE_BIN apis get \
              -n "$name" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --format json | jq -r '.revision[-1]')  # ✅ FIX 3: correct jq for array last element

            if [[ -z "$rev" || "$rev" == "null" ]]; then
              echo "ERROR: Could not determine revision for $name"
              exit 1
            fi

            # ✅ FIX 4: typo fixed "reviasion" -> "revision"
            echo "Deploying revision $rev of $name to dev..."
            $APIGEE_BIN apis deploy \
              -n "$name" \
              -e dev \
              -v "$rev" \
              -o "$APIGEE_ORG" \
              -t "$APIGEE_TOKEN" \
              --ovr
          done

          echo "Deployment successful!"